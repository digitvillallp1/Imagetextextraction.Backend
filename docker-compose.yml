version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: imagetext_db
    restart: always
    ports:
      - "5455:5432" # Changed port to 5455 to avoid conflicts
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: imagetextdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: 
      context: ./Imagetextextraction.Backend
      dockerfile: Dockerfile
    container_name: imagetext_backend
    restart: always
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=imagetextdb;Username=postgres;Password=${DB_PASSWORD:-postgres123}
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - uploads:/app/wwwroot/uploads
    networks:
      - app-network

  frontend:
    build: 
      context: ./Imagetextextraction.Frontend
      dockerfile: Dockerfile
    container_name: imagetext_frontend
    restart: always
    ports:
      - "3000:80" # Port 3000 on your PC, Port 80 inside Docker
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  pgdata:
  uploads:

networks:
  app-network:
    driver: bridge
